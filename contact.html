<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კონტაქტი | FuelPortal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="top-bar">
        <div class="logo">FuelPortal ⛽</div>
        <button id="darkModeBtn">🌙</button>
    </div>

    <nav class="nav">
        <a href="index.html">მთავარი</a>
        <a href="prices.html">ფასები</a>
        <a href="contact.html">კონტაქტი</a>
    </nav>
</header>

<section class="container">
    <h2>დაგვიკავშირდით</h2>
    <p>შეავსე ფორმა და შეგვაფასე.</p>

    <form id="contactForm" class="contact-form">
        <input type="text" id="name" placeholder="სახელი" required>
        <input type="email" id="email" placeholder="ელ-ფოსტა" required>
        <textarea id="message" placeholder="შეტყობინება" required></textarea>
        <button type="submit">გაგზავნა</button>
    </form>
</section>

<footer>
    <div class="footer-container">
        <p class="footer-copy">© 2026 FuelPortal Georgia. ყველა უფლება დაცულია.</p>
        <div class="footer-team">
            <span class="team-title">პროექტის ავტორები:</span>
            <div class="team-members">
                <span class="member-name">მარიამი აშორტია</span>
                <span class="member-name">ბაქარი მაძღარაშვილი</span>
            </div>
        </div>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
